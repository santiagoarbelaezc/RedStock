<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl border border-gray-100 shadow-sm">
    <div class="text-center">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-black text-white text-xl font-bold mb-4">R</div>
      <h2 class="text-2xl font-bold text-gray-900">Bienvenido a RedStock</h2>
      <p class="mt-2 text-sm text-gray-500">Ingresa tus credenciales para continuar</p>
    </div>
    
    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">Correo electrónico</label>
          <input formControlName="email" type="email" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all text-sm" placeholder="tu@ejemplo.com">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">Contraseña</label>
          <input formControlName="password" type="password" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all text-sm" placeholder="••••••••">
        </div>
      </div>

      <div *ngIf="error" class="text-sm text-red-600 text-center">{{ error }}</div>

      <button type="submit" [disabled]="loginForm.invalid || loading" class="w-full py-3 bg-black text-white rounded-xl font-semibold hover:bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
        {{ loading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
      </button>
    </form>
  </div>
</div>

<div class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl border border-gray-100 shadow-sm">
  <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mr-1">TEMA</span>
  @for (color of colors; track color) {
    <button (click)="setAccent(color)"
            [style.backgroundColor]="color"
            class="w-6 h-6 rounded-lg transition-transform hover:scale-110 shadow-sm border border-black/5"
            [class.ring-2]="currentColor === color"
            [class.ring-black]="currentColor === color"
            [title]="color">
    </button>
  }
</div>

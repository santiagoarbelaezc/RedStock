<div class="max-w-2xl mx-auto space-y-8">
  <div>
    <h1 class="page-title text-2xl font-bold text-gray-900 tracking-tight">
      {{ isEdit ? 'Editar Sucursal' : 'Nueva Sucursal' }}
    </h1>
    <p class="text-sm text-gray-400 mt-1">Completa la información básica de la sede</p>
  </div>

  <form [formGroup]="branchForm" (ngSubmit)="onSubmit()" class="card p-8 bg-white border border-gray-100 rounded-3xl shadow-sm space-y-6">
    <div class="grid grid-cols-1 gap-6">
      <div>
        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Nombre de la sucursal</label>
        <input formControlName="name" 
               type="text" 
               class="w-full px-4 py-3 bg-gray-50 border border-gray-50 rounded-xl focus:ring-2 focus:ring-black outline-none transition-all text-sm font-bold shadow-inner" 
               placeholder="Ej: Sede Norte">
      </div>
      <div>
        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Dirección física</label>
        <input formControlName="address" 
               type="text" 
               class="w-full px-4 py-3 bg-gray-50 border border-gray-50 rounded-xl focus:ring-2 focus:ring-black outline-none transition-all text-sm font-bold shadow-inner" 
               placeholder="Ej: Calle 100 #15-30">
      </div>
      <div>
        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Teléfono de contacto</label>
        <input formControlName="phone" 
               type="text" 
               class="w-full px-4 py-3 bg-gray-50 border border-gray-50 rounded-xl focus:ring-2 focus:ring-black outline-none transition-all text-sm font-bold shadow-inner" 
               placeholder="Ej: 300 123 4567">
      </div>
    </div>

    <div class="flex items-center gap-4 pt-6">
      <button type="submit" 
              [disabled]="branchForm.invalid || loading" 
              class="flex-1 py-4 bg-black text-white rounded-2xl font-bold text-sm uppercase tracking-widest hover:bg-gray-800 disabled:opacity-50 transition-all">
        {{ loading ? 'Guardando...' : (isEdit ? 'Actualizar Sede' : 'Crear Sede') }}
      </button>
      <button type="button" 
              (click)="router.navigate(['/branches'])" 
              class="px-8 py-4 bg-white border border-gray-100 text-gray-900 rounded-2xl font-bold text-sm uppercase tracking-widest hover:bg-gray-50 transition-all">
        Cancelar
      </button>
    </div>
  </form>
</div>

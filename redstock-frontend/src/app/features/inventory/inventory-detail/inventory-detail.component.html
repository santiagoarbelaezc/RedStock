<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="page-title text-2xl font-bold text-gray-900 tracking-tight">Detalle de Inventario</h1>
      <p class="text-sm text-gray-400 mt-0.5" *ngIf="branchName">Sucursal: {{ branchName }}</p>
    </div>
    <button (click)="router.navigate(['/inventory'])" 
            class="px-6 py-2 bg-white border border-gray-100 rounded-xl font-semibold hover:bg-gray-50 transition-all text-sm shadow-sm">
      Volver
    </button>
  </div>

  @if (loading) {
    <app-loading-spinner />
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (item of items; track item.id) {
        <div class="card p-6 bg-white border border-gray-100 rounded-3xl hover:shadow-md transition-all duration-300 flex flex-col gap-4">
          <div class="flex justify-between items-start">
            <div>
              <h4 class="font-bold text-gray-900">{{ item.product_name }}</h4>
              <p class="text-[10px] text-gray-400 font-mono uppercase tracking-widest">{{ item.sku }}</p>
            </div>
            <div class="px-3 py-1 rounded-lg bg-gray-50 text-gray-900 text-xs font-bold border border-gray-100">
              Stock: {{ item.quantity }}
            </div>
          </div>

          <div class="pt-4 border-t border-gray-50 flex items-center gap-3 mt-auto">
            <div class="relative flex-1">
               <input type="number" 
                      class="w-full pl-4 pr-10 py-2 bg-gray-50 border border-gray-50 rounded-xl focus:ring-2 focus:ring-black outline-none transition-all text-sm font-bold text-center" 
                      [(ngModel)]="item._newQty" 
                      [placeholder]="item.quantity">
            </div>
            <button (click)="updateQty(item)" 
                    class="p-2.5 bg-black text-white rounded-xl hover:bg-gray-800 transition-all shadow-lg shadow-gray-200">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
            </button>
          </div>
        </div>
      }
    </div>
  }
</div>

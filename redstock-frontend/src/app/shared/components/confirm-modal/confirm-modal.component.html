<div *ngIf="visible" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" (click)="cancel.emit()"></div>
  
  <!-- Modal -->
  <div class="relative bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 overflow-hidden transform transition-all animate-fade-in-up">
    <div class="text-center">
      <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl shadow-inner">
        ⚠️
      </div>
      <h3 class="text-xl font-bold text-gray-900 mb-2">{{ title }}</h3>
      <p class="text-sm text-gray-500 mb-8 leading-relaxed">{{ message }}</p>
      
      <div class="flex flex-col gap-3">
        <button (click)="confirm.emit()" 
                class="w-full py-3 bg-red-600 text-white rounded-xl font-semibold hover:bg-red-700 transition-all shadow-lg shadow-red-200">
          {{ confirmLabel }}
        </button>
        <button (click)="cancel.emit()" 
                class="w-full py-3 bg-gray-50 text-gray-600 rounded-xl font-semibold hover:bg-gray-100 transition-all">
          {{ cancelLabel }}
        </button>
      </div>
    </div>
  </div>
</div>

<nav class="h-16 bg-white border-b border-gray-100 px-6 flex items-center justify-between sticky top-0 z-20">
  <div class="flex items-center gap-4">
    <button (click)="toggleSidebar.emit()" class="p-2 hover:bg-gray-50 rounded-lg text-gray-500 transition-colors">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
    <div class="h-6 w-[1px] bg-gray-100 hidden sm:block"></div>
    <div class="hidden sm:block">
      <h2 class="text-sm font-semibold text-gray-900">{{ branchName }}</h2>
      <p class="text-[10px] text-gray-400 font-medium uppercase tracking-widest mt-0.5">Gestión de Inventario</p>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <div class="text-right hidden sm:block">
      <p class="text-xs font-semibold text-gray-900">{{ userName }}</p>
      <p class="text-[10px] text-gray-400 font-medium">{{ userEmail }}</p>
    </div>
    <div class="w-8 h-8 rounded-full bg-black flex items-center justify-center text-white text-[10px] font-bold">
      {{ userInitials }}
    </div>
    <button (click)="logout()" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all" title="Cerrar sesión">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
    </button>
  </div>
</nav>

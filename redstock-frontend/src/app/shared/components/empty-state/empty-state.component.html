<div class="flex flex-col items-center justify-center py-16 px-4 text-center">
  <div class="w-20 h-20 bg-gray-50 rounded-3xl flex items-center justify-center text-3xl mb-6 shadow-inner">
    {{ icon }}
  </div>
  <h3 class="text-xl font-bold text-gray-900 mb-2">{{ title }}</h3>
  <p class="text-sm text-gray-500 max-w-xs leading-relaxed mb-8">{{ message }}</p>
  
  @if (actionLabel) {
    <button (click)="action.emit()" 
            class="px-6 py-2.5 bg-black text-white rounded-xl font-semibold hover:bg-gray-800 transition-all text-sm">
      {{ actionLabel }}
    </button>
  }
</div>

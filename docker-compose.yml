services:
  db:
    image: mysql:8.0
    container_name: redstock-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - redstock-db-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - redstock-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./redstock-backend
      dockerfile: Dockerfile
      target: production
    container_name: redstock-backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - redstock-network

  frontend:
    build:
      context: ./redstock-frontend
      dockerfile: Dockerfile
    container_name: redstock-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - redstock-network

volumes:
  redstock-db-data:

networks:
  redstock-network:
    driver: bridge

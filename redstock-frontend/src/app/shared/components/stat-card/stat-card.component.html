<div class="card p-6 flex flex-col h-full bg-white border border-gray-100 rounded-2xl hover:shadow-md transition-all duration-300">
  <div class="flex items-center justify-between mb-4">
    <div class="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center text-xl shadow-inner">
      {{ icon }}
    </div>
    @if (change !== undefined) {
      <div class="flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-bold"
           [ngClass]="change >= 0 ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'">
        <span>{{ change >= 0 ? '↑' : '↓' }}</span>
        <span>{{ Math.abs(change) }}%</span>
      </div>
    }
  </div>
  
  <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">{{ title }}</h3>
  <div class="flex items-baseline gap-1">
    <span class="text-2xl font-bold text-gray-900 tracking-tight">{{ value }}</span>
  </div>
  <p class="text-[10px] text-gray-400 font-medium mt-2">{{ subtitle }}</p>
</div>
